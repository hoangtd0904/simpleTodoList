<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./src/static/icon/logo.svg">
    <title>TODO list</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./dist/app.js" defer></script>
</head>

<body>
    <main>
        <header id="header">
            <h1>TODO list</h1>
        </header>
        <section id="content">
            <section id="taskList">
                <button id="createNotification">createNoti</button>
                <button id="createDialog">createDialog</button>
            </section>
            <section id="notificationQueue">
            </section>
        </section>
        <footer id="footer">2025 © HoangTD</footer>
    </main>
</body>

</html>

<template id="templateTask">
    <label class="task">
        <input type="checkbox">
        <span class="task__checkmark"></span>
        <textarea class="task__content" placeholder="Note your task here..." autocorrect="off">
        </textarea>
    </label>
</template>

<template id="templateNoti">
    <div class="notification">
        <p class="notification__message ellipsis"></p>
    </div>
</template>

<template id="templateDialog">
    <dialog class="popup" closedby="any">
        <form method="dialog">
            <div class="popup__header">
                <h3 class="popup__title ellipsis">1234</h3>
                <img class="close-btn" src="./src/static/icon/close.svg">
            </div>
            <div class="popup__content">

            </div>
            <div class="popup__action">
                <button class="popup__btn">Close</button>
            </div>
        </form>
    </dialog>
</template>

<template id="templateCloseBtn">
    <img class="close-btn" src="./src/static/icon/close.svg">
</template>
